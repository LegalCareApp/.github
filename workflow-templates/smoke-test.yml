name: Smoke Test

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        default: 'local'
        type: choice
        options:
          - local
          - staging
          - production
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  smoke-local:
    name: Smoke Test (Local)
    if: github.event_name == 'schedule' || github.event.inputs.environment == 'local'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: legalcare_smoke
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate --schema prisma/schema.prisma

      - name: Run smoke tests (Backend)
        working-directory: backend
        run: npm run test:smoke
        env:
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5433/legalcare_smoke?schema=public'
          JWT_SECRET: 'smoke-test-secret-key'
          NODE_ENV: test

      - name: Upload smoke test results (JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-json
          path: backend/test/smoke/smoke-report-*.json
          retention-days: 30

      - name: Upload smoke test evidence (Markdown)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-evidence-md
          path: docs/sprints/smoke-evidence-*.md
          retention-days: 30

  smoke-staging:
    name: Smoke Test (Staging)
    if: github.event.inputs.environment == 'staging'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests against staging
        run: npm run smoke:staging
        env:
          SMOKE_BASE_URL: ${{ secrets.STAGING_API_URL }}

  smoke-production:
    name: Smoke Test (Production)
    if: github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests against production
        run: npm run smoke:production
        env:
          SMOKE_BASE_URL: ${{ secrets.PRODUCTION_API_URL }}
